<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trend Engine Dashboard</title>
    <script>
      // Protection against libraries trying to overwrite read-only window.fetch
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Blocked attempt to overwrite fetch'); },
            configurable: true
          });
        } catch (e) {
          console.warn('Could not define fetch property, potentially already restricted');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
